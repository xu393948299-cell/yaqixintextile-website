<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex,follow">
  <title>Page Not Found | YAQIXIN</title>
  <style>
    :root {
      color-scheme: light;
      --ink: #111827;
      --muted: #667085;
      --line: #e3d8cc;
      --accent: #ff5a00;
      --paper: #f7f3ed;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: var(--paper);
      color: var(--ink);
      font-family: Arial, Helvetica, sans-serif;
      padding: 24px;
    }
    main {
      width: min(560px, 100%);
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 36px;
      box-shadow: 0 18px 50px rgba(17, 24, 39, .08);
    }
    .brand {
      font-family: Georgia, 'Times New Roman', serif;
      font-size: 32px;
      letter-spacing: .06em;
      font-weight: 700;
      margin-bottom: 24px;
    }
    h1 {
      margin: 0 0 12px;
      font-size: clamp(30px, 7vw, 52px);
      line-height: .96;
    }
    p {
      margin: 0 0 24px;
      color: var(--muted);
      font-size: 16px;
      line-height: 1.65;
    }
    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
    }
    a {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 44px;
      padding: 0 18px;
      border-radius: 6px;
      border: 1px solid var(--line);
      color: var(--ink);
      text-decoration: none;
      font-weight: 800;
      font-size: 14px;
    }
    a.primary {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }
  </style>
</head>
<body>
  <main>
    <div class="brand">YAQIXIN</div>
    <h1>Page not found.</h1>
    <p>The page may have moved. You can return to the YAQIXIN homepage or continue browsing fabric categories.</p>
    <div class="actions">
      <a class="primary" href="index.html">Back to Home</a>
      <a href="all-products.html">View Products</a>
    </div>
  </main>
</body>
</html>
